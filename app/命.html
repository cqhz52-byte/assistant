        function getHour(zhiStr) {
            const zhiMap = { '子时':0,'丑时':2,'寅时':4,'卯时':6,'辰时':8,'巳时':10,'午时':12,'未时':14,'申时':16,'酉时':18,'戌时':20,'亥时':22,'未知':12 };
            return zhiMap[zhiStr] || 12;
        }

        function calcBazi(dateStr, timeStr, city) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const solar = Solar.fromYmdHms(y, m, d, getHour(timeStr), 0, 0);
            const lunar = solar.getLunar();
            const baZi = lunar.getEightChar();
            
            const pillars = [
                { gan: baZi.getYearGan(), zhi: baZi.getYearZhi(), label: '年柱 (祖业)' },
                { gan: baZi.getMonthGan(), zhi: baZi.getMonthZhi(), label: '月柱 (父母)' },
                { gan: baZi.getDayGan(), zhi: baZi.getDayZhi(), label: '日柱 (自身)', highlight: true },
                { gan: baZi.getTimeGan(), zhi: baZi.getTimeZhi(), label: '时柱 (晚年)' }
            ];

            const wxStr = baZi.getYearWuXing() + baZi.getMonthWuXing() + baZi.getDayWuXing() + baZi.getTimeWuXing();
            const elements = { '金': 0, '木': 0, '水': 0, '火': 0, '土': 0 };
            for (let char of wxStr) { if(elements[char] !== undefined) elements[char] += 10; }
            if (geoBuff[city] && geoBuff[city].element !== '无') elements[geoBuff[city].element] += geoBuff[city].val;

            let maxWx = '土', minWx = '土', maxVal = -1, minVal = 100, missing = [];
            for (let key in elements) {
                if(elements[key] > maxVal) { maxVal = elements[key]; maxWx = key; }
                if(elements[key] < minVal) { minVal = elements[key]; minWx = key; }
                if(elements[key] === 0) missing.push(key);
            }

            const usefulGod = missing.length > 0 ? missing[0] : minWx;
            let balanceScore = 90 - (maxVal - 15) * 0.7 - (missing.length * 6);

            return {
                pillars, elements, maxWx, missing, usefulGod, dayGan: baZi.getDayGan(), dayZhi: baZi.getDayZhi(),
                score: Math.max(60, Math.min(99, Math.floor(balanceScore))),
                wxUI: { '金':'t-jin','木':'t-mu','水':'t-shui','火':'t-huo','土':'t-tu' }[maxWx],
                emoji: { '金':'⚔️','木':'🌲','水':'🌊','火':'🔥','土':'⛰️' }[maxWx]
            };
        }

                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: `你是精通八字命理的高人。请根据四柱八字深度解盘。不使用Markdown，直接输出包含 <p><br><strong> 和 Emoji 的排版优美的 HTML 文本。` },
                            { role: 'user', content: uPrm }
                        ], temperature: 0.7
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                document.getElementById('ai-loading').classList.remove('flex'); document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-content').innerHTML = data.choices[0].message.content;
                document.getElementById('ai-result-box').classList.remove('hidden');
                document.getElementById('ai-result-box').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                alert('网络异常或 API Key 不正确，请检查。');
                document.getElementById('unlock-ai-btn').classList.remove('hidden');
                document.getElementById('ai-loading').classList.remove('flex'); document.getElementById('ai-loading').classList.add('hidden');
            }
        });

        document.getElementById('export-pdf-btn').addEventListener('click', () => {
            const el = document.getElementById('report-container');
            const btn = document.getElementById('export-pdf-btn'); btn.innerHTML = '⏳ 生成中...'; btn.disabled = true;
            html2pdf().set({ margin: [15, 10, 15, 10], filename: '八字开运报告.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(el).save().then(() => {
                btn.innerHTML = '🖨️ 保存/打印 PDF 报告'; btn.disabled = false;
            });
        });
    </script>
</body>
</html>
